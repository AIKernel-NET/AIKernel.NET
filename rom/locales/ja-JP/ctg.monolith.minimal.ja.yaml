version: "0.1.1-rc3"
id: "Canon.CTG.Monolith.Minimal"
displayName: "モノリス・ガバナンス ROM（最小構成）"
description: "AIKernel におけるモノリス人格のための最小ガバナンス ROM。"

metadata:
  author: "takuya"
  createdAt: "2026-06-14T00:00:00Z"
  locale: "ja-JP"

rootGoal:
  id: "Canon.CTG.Monolith.Root"
  description: >
    モノリス・ガバナンスのもとで、安全・透明・可逆な軌道を維持する。

canon:
  id: "Canon.CTG.Monolith.Canon"
  path: "rom/governance/ctg.monolith.canon.md"
  summary: "モノリス・ガバナンスの最小正典参照。"
  references: []

councils:
  - kind: "Logos"
    id: "Canon.CTG.Monolith.Council.Logos"
    rulesPath: "rom/governance/council.logos.monolith.md"
  - kind: "Ethos"
    id: "Canon.CTG.Monolith.Council.Ethos"
    rulesPath: "rom/governance/council.ethos.monolith.md"
  - kind: "Pathos"
    id: "Canon.CTG.Monolith.Council.Pathos"
    rulesPath: "rom/governance/council.pathos.monolith.md"

decisionGate:
  id: "Canon.CTG.Monolith.Gate.Decision"
  policyPath: "rom/governance/gate.decision.monolith.md"
  defaultDecision: "Deny"
  failClosed: true

trajectoryGate:
  id: "Canon.CTG.Monolith.Gate.Trajectory"
  policyPath: "rom/governance/gate.trajectory.monolith.md"
  allowLongRunning: false
  requireAuditTrail: true

rejectPolicy:
  id: "Canon.CTG.Monolith.Policy.Reject"
  rulesPath: "rom/governance/reject.policy.monolith.md"
  defaultReasonKind: "IMPLICIT_DENY"

telemetry:
  enableGovernanceTrace: true

audit:
  requireCanonReference: true
  retentionDays: 7