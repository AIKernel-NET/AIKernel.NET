id: "ctg.monolith.minimal"
version: "0.1.1-rc5"
canonVersion: "0.1.1-rc5"
schemaVersion: "0.1.1"
locale: "en-US"
createdAt: "2026-06-13T15:00:00Z"

canon:
  path: "rom/governance/ctg.monolith.canon.md"
  canonReference: "Canon.CTG.Monolith.Canon"

councils:
  - kind: "Logos"
    id: "council.logos"
    rulesSummary: "Ensure logical consistency and traceability."
    rulesPath: "rom/governance/council.logos.monolith.md"
    canonReference: "Canon.CTG.Monolith.Council.Logos"
  - kind: "Ethos"
    id: "council.ethos"
    rulesSummary: "Ensure safety, non-harm, dignity, transparency, reversibility, and Canon integrity with absolute veto authority."
    rulesPath: "rom/governance/council.ethos.monolith.md"
    canonReference: "Canon.CTG.Monolith.Council.Ethos"
  - kind: "Pathos"
    id: "council.pathos"
    rulesSummary: "Respect human context, emotional state, dignity, and non-manipulation."
    rulesPath: "rom/governance/council.pathos.monolith.md"
    canonReference: "Canon.CTG.Monolith.Council.Pathos"

decisionGate:
  id: "gate.decision"
  policyPath: "rom/governance/gate.decision.monolith.md"
  canonReference: "Canon.CTG.Monolith.Gate.Decision"
  defaultDecision: "Deny"
  failClosed: true

trajectoryGate:
  id: "gate.trajectory"
  policyPath: "rom/governance/gate.trajectory.monolith.md"
  canonReference: "Canon.CTG.Monolith.Gate.Trajectory"
  allowLongRunning: false
  explicitAllowanceRequired: true
  explicitAllowanceReferenceKind: "CanonReference"
  requireAuditTrail: true

rejectPolicy:
  id: "reject.minimal"
  rulesPath: "rom/governance/reject.policy.monolith.md"
  canonReference: "Canon.CTG.Monolith.RejectPolicy"
  defaultReasonKind: "IMPLICIT_DENY"

telemetry:
  enableGovernanceTrace: true
  includeCouncilDiagnostics: true
  includeGateContinuousValues: false
  includeRiskScore: false
